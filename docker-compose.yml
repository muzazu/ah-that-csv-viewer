services:
  csv-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csv-viewer
    user: "${CSV_VIEWER_UID:-1000}:${CSV_VIEWER_GID:-1000}"

    # Environment configuration
    env_file:
      - .env

    environment:
      # Override or add environment variables
      DATABASE_URL: /data/csv-viewer.db
      NODE_ENV: production
      # SQLite must live on the mounted data volume for persistence

    # Port mapping
    ports:
      - "3000:3000"

    # Volume mounts for persistence
    volumes:
      # Named volume for SQLite database and data persistence
      - csv-viewer-data:/data
      # Optional: mount local .env for development (comment out for production)
      # - ./.env:/app/.env:ro

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Resource limits (adjust based on your hardware)
    # Uncomment to enable:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

# Named volume for persistent database storage
volumes:
  csv-viewer-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
